<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anandita! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Righteous&family=Quicksand:wght@400;600;700&family=Satisfy&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink:   #ff6b9d;
    --yellow: #ffd93d;
    --mint:   #43e97b;
    --blue:   #4d96ff;
    --purple: #a855f7;
    --orange: #ff922b;
  }

  body {
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    overflow-x: hidden;
    background: #0a0a1a;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #2d0050 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #001a40 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #1a0030 0%, #0a0a1a 100%);
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    animation: orbFloat linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width:300px;height:300px;background:var(--pink);top:-100px;left:-100px;animation-duration:12s; }
  .orb2 { width:250px;height:250px;background:var(--purple);bottom:-80px;right:-80px;animation-duration:15s;animation-delay:-5s; }
  .orb3 { width:200px;height:200px;background:var(--blue);top:40%;left:70%;animation-duration:10s;animation-delay:-3s; }
  .orb4 { width:180px;height:180px;background:var(--yellow);top:60%;left:10%;animation-duration:14s;animation-delay:-7s; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0) scale(1); }
    33%      { transform: translateY(-40px) scale(1.1); }
    66%      { transform: translateY(20px) scale(0.9); }
  }

  #starCanvas { position:fixed;inset:0;z-index:0;pointer-events:none; }

  .confetti-wrap { position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden; }
  .c { position:absolute;border-radius:2px;animation:cFall linear infinite;opacity:0; }
  @keyframes cFall {
    0%   { transform:translateY(-10px) rotate(0deg);   opacity:1; }
    100% { transform:translateY(105vh) rotate(600deg); opacity:0.2; }
  }

  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px 100px;
    gap: 40px;
  }

  /* BALLOONS */
  .balloons {
    display: flex;
    gap: 10px;
    animation: riseUp 1.2s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes riseUp {
    from { transform:translateY(80px);opacity:0; }
    to   { transform:translateY(0);opacity:1; }
  }
  .b { font-size:3rem; display:inline-block; }
  .b:nth-child(odd)  { animation: swayL 3s ease-in-out infinite; }
  .b:nth-child(even) { animation: swayR 3s ease-in-out infinite; animation-delay:.5s; }
  @keyframes swayL { 0%,100%{transform:rotate(-10deg) translateY(0)}  50%{transform:rotate(6deg) translateY(-18px)} }
  @keyframes swayR { 0%,100%{transform:rotate(10deg) translateY(0)}   50%{transform:rotate(-6deg) translateY(-18px)} }

  /* HERO */
  .hero {
    text-align: center;
    animation: popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) .3s both;
  }
  @keyframes popIn {
    from { transform:scale(0.4) rotate(-5deg); opacity:0; }
    to   { transform:scale(1) rotate(0deg);    opacity:1; }
  }
  .hero-sub {
    font-family: 'Satisfy', cursive;
    font-size: clamp(1.1rem, 4vw, 1.8rem);
    color: rgba(255,255,255,0.65);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .hero-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(4rem, 14vw, 8rem);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--pink) 0%, var(--yellow) 35%, var(--mint) 65%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameGlow 2s ease-in-out infinite;
  }
  @keyframes nameGlow {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,107,157,0.4)); }
    50%      { filter: drop-shadow(0 0 50px rgba(255,217,61,0.7)); }
  }
  .hero-exclaim {
    font-family: 'Righteous', cursive;
    font-size: clamp(1rem, 3.5vw, 1.6rem);
    color: var(--yellow);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 10px;
    animation: letterSpread 3s ease-in-out infinite;
  }
  @keyframes letterSpread {
    0%,100% { letter-spacing:6px; }
    50%      { letter-spacing:10px; }
  }

  /* CAKE + FIREWORKS */
  .cake-wrap {
    position: relative;
    animation: popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) .6s both;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 320px;
    height: 320px;
  }
  #fireworksCanvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: 20px;
  }
  .cake-emoji-center {
    position: relative;
    z-index: 2;
    font-size: 6rem;
    animation: cakeFloat 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255,217,61,0.9));
  }
  @keyframes cakeFloat {
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-14px) scale(1.08);}
  }

  /* EMOJI BAND */
  .emoji-band {
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    animation:popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) .9s both;
  }
  .eb {
    font-size:2.2rem;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:10px 14px;
    animation:ebBounce 2s ease-in-out infinite;
    transition:transform .2s;
    cursor:default;
  }
  .eb:hover{transform:scale(1.4) rotate(15deg)!important;}
  .eb:nth-child(1){animation-delay:0s}.eb:nth-child(2){animation-delay:.15s}
  .eb:nth-child(3){animation-delay:.3s}.eb:nth-child(4){animation-delay:.45s}
  .eb:nth-child(5){animation-delay:.6s}.eb:nth-child(6){animation-delay:.75s}
  @keyframes ebBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  /* GIFT BOX */
  .gift-wrap {
    animation:popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) 1.2s both;
    display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .gift-box { width:200px;height:200px;perspective:800px;cursor:pointer; }
  .gift-inner {
    width:100%;height:100%;position:relative;
    transform-style:preserve-3d;
    transition:transform 1s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .gift-box.open .gift-inner{transform:rotateY(180deg) scale(1.05);}
  .gift-face {
    position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  }
  .gift-front-face {
    background:linear-gradient(145deg,#ff6b9d,#ff922b);
    box-shadow:0 20px 60px rgba(255,107,157,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
    border:3px solid rgba(255,255,255,0.3);
    position:relative;overflow:hidden;
  }
  .gift-front-face::before{
    content:'';position:absolute;top:0;bottom:0;left:50%;width:6px;
    background:rgba(255,255,255,0.4);transform:translateX(-50%);border-radius:3px;
  }
  .gift-front-face::after{
    content:'';position:absolute;left:0;right:0;top:50%;height:6px;
    background:rgba(255,255,255,0.4);transform:translateY(-50%);border-radius:3px;
  }
  .gift-bow{
    font-size:3rem;z-index:2;
    animation:bowPulse 1.5s ease-in-out infinite;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  }
  @keyframes bowPulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.15) rotate(5deg)}}
  .gift-tap{
    z-index:2;font-family:'Righteous',cursive;font-size:.8rem;letter-spacing:2px;
    color:white;background:rgba(255,255,255,0.2);backdrop-filter:blur(4px);
    padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);
  }
  .gift-back-face {
    background:linear-gradient(145deg,#7c3aed,#db2777);
    box-shadow:0 20px 60px rgba(124,58,237,0.5);
    border:3px solid rgba(255,255,255,0.2);
    transform:rotateY(180deg);
  }
  .gift-msg{
    font-family:'Dancing Script',cursive;font-size:1.5rem;
    color:white;text-align:center;line-height:1.4;
    text-shadow:0 2px 15px rgba(0,0,0,0.4);padding:0 16px;
  }
  .gift-hearts{font-size:2rem;animation:heartPop 1s ease-in-out infinite;}
  @keyframes heartPop{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

  .hint{
    font-family:'Quicksand',sans-serif;font-size:.85rem;font-weight:700;
    color:rgba(255,255,255,0.45);letter-spacing:2px;text-transform:uppercase;
    animation:hintBlink 2s ease-in-out infinite;transition:opacity .5s;
  }
  @keyframes hintBlink{0%,100%{opacity:.3}50%{opacity:1}}

  /* STAR ROW */
  .star-row{
    display:flex;gap:12px;
    animation:popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) 1.5s both;
  }
  .sr{font-size:2rem;animation:srTwinkle 1.5s ease-in-out infinite;}
  .sr:nth-child(1){animation-delay:0s}.sr:nth-child(2){animation-delay:.2s}
  .sr:nth-child(3){animation-delay:.4s}.sr:nth-child(4){animation-delay:.6s}
  .sr:nth-child(5){animation-delay:.8s}
  @keyframes srTwinkle{0%,100%{transform:scale(1) rotate(0);opacity:1}50%{transform:scale(1.4) rotate(20deg);opacity:.6}}

  /* BURST */
  .burst-p{
    position:fixed;pointer-events:none;z-index:999;
    animation:burstAnim 1.2s ease-out forwards;
  }
  @keyframes burstAnim{
    0%{transform:translate(0,0) scale(1.2);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>
<canvas id="starCanvas"></canvas>
<div class="confetti-wrap" id="confWrap"></div>

<div class="page">

  <div class="balloons">
    <span class="b">🎈</span>
    <span class="b">🎊</span>
    <span class="b">🎀</span>
    <span class="b">🎉</span>
    <span class="b">🎈</span>
    <span class="b">🎊</span>
    <span class="b">🎀</span>
  </div>

  <div class="hero">
    <div class="hero-sub">✨ wishing you the most magical day ✨</div>
    <div class="hero-name">Anandita</div>
    <div class="hero-exclaim">🎂 Happy Birthday 🎂</div>
  </div>

  <div class="cake-wrap">
    <canvas id="fireworksCanvas" width="320" height="320"></canvas>
    <span class="cake-emoji-center">🎂</span>
  </div>

  <div class="emoji-band">
    <div class="eb">🌈</div>
    <div class="eb">💖</div>
    <div class="eb">🌟</div>
    <div class="eb">🦋</div>
    <div class="eb">🌸</div>
    <div class="eb">💫</div>
  </div>

  <div class="gift-wrap">
    <div class="gift-box" id="giftBox" onclick="openGift()">
      <div class="gift-inner" id="giftInner">
        <div class="gift-face gift-front-face">
          <span class="gift-bow">🎁</span>
          <span class="gift-tap">TAP TO OPEN</span>
        </div>
        <div class="gift-face gift-back-face">
          <div class="gift-msg">Happy Birthday<br>Meri Dost! 🎂</div>
          <div class="gift-hearts">💖 💛 💜</div>
        </div>
      </div>
    </div>
    <div class="hint" id="hint">👇 tap the gift</div>
  </div>

  <div class="star-row">
    <span class="sr">⭐</span>
    <span class="sr">🌟</span>
    <span class="sr">💫</span>
    <span class="sr">🌟</span>
    <span class="sr">⭐</span>
  </div>

</div>

<script>
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); window.addEventListener('resize',resize);
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.5+.3,a:Math.random(),
    da:(Math.random()*.02+.005)*(Math.random()<.5?1:-1)});
}
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.a+=s.da; if(s.a>1||s.a<0)s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

const colors=['#ff6b9d','#ffd93d','#43e97b','#4d96ff','#a855f7','#ff922b','#f472b6'];
const wrap=document.getElementById('confWrap');
for(let i=0;i<70;i++){
  const el=document.createElement('div');
  el.className='c';
  const size=Math.random()*8+5;
  el.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size*1.4}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    border-radius:${Math.random()>.5?'50%':'2px'};
    animation-duration:${Math.random()*5+4}s;animation-delay:${Math.random()*6}s;
    transform:rotate(${Math.random()*360}deg);`;
  wrap.appendChild(el);
}

// ---- Fireworks around cake ----
const fwCanvas = document.getElementById('fireworksCanvas');
const fwCtx = fwCanvas.getContext('2d');
const FW = { w: 320, h: 320 };
let particles = [];

const fwColors = [
  '#ff6b9d','#ffd93d','#43e97b','#4d96ff',
  '#a855f7','#ff922b','#f472b6','#ffffff','#00eaff'
];

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.decay = Math.random() * 0.02 + 0.012;
    this.radius = Math.random() * 2.5 + 1;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 5) this.trail.shift();
    this.vy += 0.06; // gravity
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;
    this.alpha -= this.decay;
  }
  draw(ctx) {
    // trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (i / this.trail.length) * this.alpha * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color.replace(')', `,${a})`).replace('rgb','rgba').replace('#', 'rgba(').replace('rgba(','rgba(') ;
      ctx.globalAlpha = a;
      ctx.fill();
    }
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function launchFirework() {
  // launch from edges/top area away from cake center
  const cx = FW.w / 2, cy = FW.h / 2;
  // pick a random spot not too close to center
  let x, y;
  const side = Math.floor(Math.random() * 4);
  if (side === 0) { x = Math.random() * FW.w * 0.4; y = Math.random() * FW.h * 0.5; }
  else if (side === 1) { x = FW.w - Math.random() * FW.w * 0.4; y = Math.random() * FW.h * 0.5; }
  else if (side === 2) { x = Math.random() * FW.w * 0.3; y = FW.h * 0.5 + Math.random() * FW.h * 0.4; }
  else { x = FW.w - Math.random() * FW.w * 0.3; y = FW.h * 0.5 + Math.random() * FW.h * 0.4; }

  const color = fwColors[Math.floor(Math.random() * fwColors.length)];
  const count = Math.floor(Math.random() * 30) + 40;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function animateFireworks() {
  fwCtx.clearRect(0, 0, FW.w, FW.h);
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => { p.update(); p.draw(fwCtx); });
  requestAnimationFrame(animateFireworks);
}

animateFireworks();
// Launch fireworks continuously
setInterval(launchFirework, 600);
launchFirework(); launchFirework();
function openGift(){
  if(opened)return; opened=true;
  document.getElementById('giftBox').classList.add('open');
  document.getElementById('hint').style.opacity='0';
  const emojis=['🎉','✨','💖','🌟','🎊','💛','🌈','🎈','🦋','🌸'];
  const rect=document.getElementById('giftBox').getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='burst-p';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const angle=(Math.PI*2*i)/30+Math.random()*.4;
    const dist=120+Math.random()*200;
    el.style.cssText=`left:${cx}px;top:${cy}px;font-size:${Math.random()*1.5+1}rem;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*.3}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
  for(let i=0;i<40;i++){
    const el=document.createElement('div'); el.className='c';
    const size=Math.random()*10+6;
    el.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size*1.4}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${Math.random()*2+2}s;animation-delay:0s;`;
    wrap.appendChild(el); setTimeout(()=>el.remove(),4500);
  }
}
</script>
</body>
</html>
